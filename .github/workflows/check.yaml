# This workflow runs for every pull request to lint and test the proposed changes.

name: Check

on:
    pull_request:

    # Push to master will trigger code checks
    push:
        branches:
            - master
        tags-ignore:
            - '**' # Ignore all tags to prevent duplicate builds when tags are pushed.

    # Release flow will trigger checks manually
    workflow_call:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build_and_test:
        name: Build & Test
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                node-version: [20, 22, 24]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.1.2
              env:
                  # Puppeteer's postinstall kicks off the Chrome download in a
                  # fire-and-forget Promise (downloadBrowsers() is not awaited
                  # in puppeteer's install.mjs). When pnpm install returns
                  # before the download finishes, ~/.cache/puppeteer is left
                  # half-populated, and the subsequent `browsers install`
                  # silently no-ops because the directory already exists.
                  # Skip the postinstall download entirely and let the explicit
                  # step below do it synchronously.
                  PUPPETEER_SKIP_DOWNLOAD: 1

            - name: Install Chrome for puppeteer
              # TEMPORARY DIAGNOSTIC: figure out why this step silently no-ops
              # on Node 24 sometimes (finishes in ~1s with no output, leaving
              # Chrome uninstalled). Revert to a single-line `run:` once we
              # know the cause.
              run: |
                  echo "=== Node + pnpm versions ==="
                  node --version
                  pnpm --version
                  echo "=== Puppeteer-related env ==="
                  env | grep -i puppeteer || echo "(no PUPPETEER_* env vars)"
                  echo "=== Puppeteer cache state before ==="
                  ls -la ~/.cache/puppeteer 2>&1 || echo "(no cache dir)"
                  echo "=== Cosmiconfig search paths (.puppeteerrc.*, puppeteer.config.*) ==="
                  for dir in . .. ../.. ~ /home /; do
                      ls -la "$dir"/.puppeteerrc* "$dir"/puppeteer.config* 2>/dev/null || true
                  done
                  echo "=== puppeteer.configuration as the CLI sees it ==="
                  node -e "console.log(JSON.stringify(require('puppeteer/internal/getConfiguration.js').getConfiguration(), null, 2))" || true
                  echo "=== Running the actual install (DEBUG=puppeteer:*) ==="
                  set -x
                  DEBUG='puppeteer:*,@puppeteer/browsers:*' pnpm exec puppeteer browsers install chrome
                  echo "=== Puppeteer cache state after ==="
                  ls -la ~/.cache/puppeteer 2>&1 || echo "(no cache dir)"
                  find ~/.cache/puppeteer -maxdepth 4 -type f 2>/dev/null | head -20 || true

            - name: Run Tests
              run: pnpm test

    test_bundling:
        name: Test bundler support
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24

            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.1.2

            - name: Run Tests
              run: pnpm test:bundling

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.1.2
            - run: pnpm lint
            - name: Format check
              run: pnpm format:check

    docs:
        name: Docs build
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source code
              uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
            - name: Install pnpm and dependencies
              uses: apify/actions/pnpm-install@v1.1.2

            - name: Build docs
              run: |
                  cd website
                  pnpm lint
                  pnpm build
