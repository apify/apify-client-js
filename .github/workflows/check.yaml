# This workflow runs for every pull request to lint and test the proposed changes.

name: Check

on:
    pull_request:

    # Push to master will trigger code checks
    push:
        branches:
            - master
        tags-ignore:
            - '**' # Ignore all tags to prevent duplicate builds when tags are pushed.

    # Release flow will trigger checks manually
    workflow_call:

jobs:
    build_and_test:
        name: Build & Test
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                node-version: [18, 20, 22, 24]

        steps:
            - name: Cancel Workflow Action
              uses: styfle/cancel-workflow-action@0.13.0
              with:
                  access_token: ${{ github.token }}

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Use Node.js ${{ matrix.node-version }}
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: 'npm'
                  cache-dependency-path: 'package-lock.json'

            - name: Install Dependencies
              run: npm ci

            - name: Run Tests
              run: npm test

    test_bundling:
        name: Test bundler support
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'
                  cache-dependency-path: 'package-lock.json'

            - name: Install Dependencies
              run: npm ci

            - name: Run Tests
              run: npm run test:bundling

    lint:
        name: Lint
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'
                  cache-dependency-path: 'package-lock.json'
            - name: Install Dependencies
              run: npm ci
            - run: npm run lint
            - name: Prettier
              run: npm run format:check

    docs:
        name: Docs build
        if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Source code
              uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'
                  cache-dependency-path: 'package-lock.json'
            - name: Install Dependencies
              run: npm ci

            - name: Install & build & deploy docs
              run: |
                  npm ci --force
                  cd website
                  npm ci --force
                  npm run lint
                  npm run build

            - name: Run Lychee Link Checker
              id: lychee
              uses: lycheeverse/lychee-action@v2.8.0
              with:
                  fail: false
                  args: >
                      --base-url https://docs.apify.com
                      --max-retries 6
                      --exclude="github.com"
                      --exclude="npmjs.com"
                      --no-progress
                      --timeout '60'
                      --accept '100..=103,200..=299,429'
                      --max-redirects 5
                      --format markdown
                      './website/build/**/*.html'

            - name: Find Comment
              if: github.event_name == 'pull_request'
              uses: peter-evans/find-comment@v3
              id: find-comment
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  body-includes: There are broken links in the documentation.

            - name: Links are passing
              if: github.event_path == 'pull_request' && steps.lychee.outputs.exit_code == 0 && steps.find-comment.outputs.comment-id
              uses: peter-evans/create-or-update-comment@v5
              with:
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  issue-number: ${{ github.event.pull_request.number }}
                  body: |
                      ✅ The link checker did not find any broken links.

                      See more at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#summary-${{ job.check_run_id }}
                  edit-mode: replace

            - name: Links are failing
              if: github.event_path == 'pull_request' && steps.lychee.outputs.exit_code != 0
              uses: peter-evans/create-or-update-comment@v5
              with:
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  issue-number: ${{ github.event.pull_request.number }}
                  body: |
                      ⚠️ There are broken links in the documentation.

                      See more at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}#summary-${{ job.check_run_id }}
                  edit-mode: replace
